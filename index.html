<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Expenditure Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-card {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            color: #333;
            display: none; /* Hidden by default until calculation */
        }
        .equation-note {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Food Expenditure Predictor</h2>
    
    <div class="form-group">
        <label for="income">Monthly Income (RM):</label>
        <input type="number" id="income" placeholder="e.g., 50" step="any" required>
    </div>
    
    <div class="form-group">
        <label for="familySize">Family Size (Number of people):</label>
        <input type="number" id="familySize" placeholder="e.g., 4" step="any" required>
    </div>
    
    <button onclick="calculateFood()">Calculate Prediction</button>
    
    <div id="result" class="result-box">
        <strong>Predicted Food Expenditure:</strong><br>
        <span id="predictedValue" style="font-size: 24px; color: #28a745; font-weight: bold;">RM 0.00</span>
    </div>

    <div class="equation-note">
        Model Used: Food = -1.1183 + 0.1482(Income) + 0.7931(Family Size)
    </div>
</div>

<script>
    function calculateFood() {
        // 1. Get the input values
        var incomeInput = document.getElementById('income').value;
        var sizeInput = document.getElementById('familySize').value;
        
        // Check if inputs are empty
        if (incomeInput === "" || sizeInput === "") {
            alert("Please enter both Income and Family Size.");
            return;
        }

        var income = parseFloat(incomeInput);
        var familySize = parseFloat(sizeInput);

        // 2. Apply the regression model formula
        // Food = -1.1183 + 0.1482*(Income) + 0.7931*(Family Size)
        var predictedFood = -1.1183 + (0.1482 * income) + (0.7931 * familySize);

        // Prevent negative predictions (since negative food expenditure doesn't make sense)
        if (predictedFood < 0) {
            predictedFood = 0;
        }

        // 3. Display the result
        var resultDiv = document.getElementById('result');
        var predictedValueSpan = document.getElementById('predictedValue');
        
        // Format to 2 decimal places for currency
        predictedValueSpan.innerHTML = "RM " + predictedFood.toFixed(2);
        
        // Make the result box visible
        resultDiv.style.display = "block";
    }
</script>

</body>
</html>
